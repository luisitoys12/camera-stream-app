name: Build APK & AAB (Play Store)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Bootstrap gradle-wrapper.jar
        run: |
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-8.11.1-bin.zip" \
            -o /tmp/gradle.zip
          unzip -p /tmp/gradle.zip "gradle-8.11.1/lib/gradle-wrapper.jar" \
            > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          unzip /tmp/gradle.zip -d /tmp/gradle-dist && \
          find /tmp/gradle-dist -name "gradle-wrapper.jar" -exec cp {} gradle/wrapper/gradle-wrapper.jar \;
          chmod +x gradlew
          echo "gradle-wrapper.jar size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: false

      - uses: android-actions/setup-android@v3

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --continue -x lint

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: app/build/reports/tests/
          if-no-files-found: warn

  build:
    name: Build Signed APK + AAB
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Bootstrap gradle-wrapper.jar
        run: |
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-8.11.1-bin.zip" \
            -o /tmp/gradle.zip
          unzip -p /tmp/gradle.zip "gradle-8.11.1/lib/gradle-wrapper.jar" \
            > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          unzip /tmp/gradle.zip -d /tmp/gradle-dist && \
          find /tmp/gradle-dist -name "gradle-wrapper.jar" -exec cp {} gradle/wrapper/gradle-wrapper.jar \;
          chmod +x gradlew
          echo "gradle-wrapper.jar size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: false

      - uses: android-actions/setup-android@v3

      - name: Download NodeMedia AAR
        run: |
          mkdir -p app/libs
          curl -fL "https://github.com/NodeMedia/NodeMediaClient-Android/releases/download/2.9.2/NodeMediaClient.aar" \
            -o app/libs/NodeMediaClient.aar 2>/dev/null || echo "NodeMedia: usando JitPack"

      - name: Download cloudflared arm64
        run: |
          mkdir -p app/src/main/assets
          curl -fL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64" \
            -o app/src/main/assets/cloudflared-arm64 && \
          chmod +x app/src/main/assets/cloudflared-arm64 || echo "skip"

      - name: Decode or generate Keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > app/keystore.jks
            echo "SIGN_MODE=oficial" >> $GITHUB_ENV
          else
            keytool -genkeypair -v \
              -keystore app/keystore.jks -alias camerastream \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass camerastream123 -keypass camerastream123 \
              -dname "CN=CameraStream,OU=Dev,O=EstacionKUS,L=Irapuato,S=GTO,C=MX" 2>/dev/null
            echo "SIGN_MODE=auto" >> $GITHUB_ENV
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace -x lint
        env:
          KEYSTORE_FILE: app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'camerastream123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'camerastream' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'camerastream123' }}

      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon -x lint
        env:
          KEYSTORE_FILE: app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'camerastream123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'camerastream' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'camerastream123' }}

      - name: Rename artifacts
        id: art
        run: |
          V="2.0.0-$(date +'%Y%m%d')"
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          AAB=$(find app/build/outputs/bundle/release -name '*.aab' | head -1)
          cp "$APK" "/tmp/CameraStream-v${V}.apk"
          cp "$AAB" "/tmp/CameraStream-v${V}.aab"
          echo "apk=/tmp/CameraStream-v${V}.apk" >> $GITHUB_OUTPUT
          echo "aab=/tmp/CameraStream-v${V}.aab" >> $GITHUB_OUTPUT
          echo "v=$V" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        id: apk_artifact
        with:
          name: CameraStream-APK
          path: ${{ steps.art.outputs.apk }}
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name: CameraStream-AAB-PlayStore
          path: ${{ steps.art.outputs.aab }}
          retention-days: 90

      - name: Generate QR code for APK download
        run: |
          pip install qrcode[pil] --quiet
          python3 - <<'EOF'
          import qrcode, os, base64, io
          url = os.environ["RUN_URL"]
          qr = qrcode.QRCode(version=None, error_correction=qrcode.constants.ERROR_CORRECT_M, box_size=8, border=2)
          qr.add_data(url)
          qr.make(fit=True)
          img = qr.make_image(fill_color="black", back_color="white")
          buf = io.BytesIO()
          img.save(buf, format="PNG")
          b64 = base64.b64encode(buf.getvalue()).decode()
          with open("/tmp/qr_b64.txt", "w") as f:
              f.write(b64)
          EOF
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Summary
        run: |
          V="${{ steps.art.outputs.v }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          QR_B64=$(cat /tmp/qr_b64.txt)
          echo "## ✅ CameraStream v${V}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 Escanea para descargar el APK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "![QR APK](data:image/png;base64,${QR_B64})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Abre la cámara de tu cel, escanea el QR y baja directo a la página del run → **CameraStream-APK**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Archivo | Uso |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Instalar directo en tu cel 📱 |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB | Google Play Console |" >> $GITHUB_STEP_SUMMARY
          echo "| Firma: $SIGN_MODE | |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [Ir al run directamente](${RUN_URL})" >> $GITHUB_STEP_SUMMARY
