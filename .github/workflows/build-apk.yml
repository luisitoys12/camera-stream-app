name: Build & Upload APK to OneDrive

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Download cloudflared arm64
        run: |
          mkdir -p app/src/main/assets
          curl -L "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64" \
            -o app/src/main/assets/cloudflared-arm64
          chmod +x app/src/main/assets/cloudflared-arm64

      - name: Decode Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
          else
            keytool -genkeypair -v \
              -keystore app/keystore.jks \
              -alias camerastream \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass camerastream123 \
              -keypass camerastream123 \
              -dname "CN=CameraStream, OU=Dev, O=EstacionKUS, L=Irapuato, S=GTO, C=MX"
            echo "⚠️ Usando keystore temporal autogenerado"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_FILE: app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'camerastream123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'camerastream' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'camerastream123' }}

      - name: Rename APK
        id: apk_name
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_NAME="CameraStream-v1.1.0-${DATE}.apk"
          cp "$APK_SRC" "/tmp/${APK_NAME}"
          echo "apk_path=/tmp/${APK_NAME}" >> $GITHUB_OUTPUT
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT

      - name: Upload APK as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CameraStream-APK
          path: ${{ steps.apk_name.outputs.apk_path }}
          retention-days: 30

      - name: Upload to OneDrive (opcional)
        if: ${{ secrets.ONEDRIVE_RCLONE_TOKEN != '' }}
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [onedrive]
          type = onedrive
          token = ${{ secrets.ONEDRIVE_RCLONE_TOKEN }}
          drive_id = ${{ secrets.ONEDRIVE_DRIVE_ID }}
          drive_type = personal
          EOF
          rclone copy "${{ steps.apk_name.outputs.apk_path }}" "onedrive:CameraStream/APKs/" --progress

      - name: Build Summary
        run: |
          echo "## ✅ APK Listo" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Archivo | ${{ steps.apk_name.outputs.apk_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Descarga | GitHub Actions → Artifacts |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
