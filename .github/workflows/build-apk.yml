name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle Wrapper
        run: |
          sudo apt-get install -y gradle 2>/dev/null || true
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin || true
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Download NodeMedia AAR
        run: |
          mkdir -p app/libs
          curl -fL "https://github.com/NodeMedia/NodeMediaClient-Android/releases/download/2.9.2/NodeMediaClient.aar" \
            -o app/libs/NodeMediaClient.aar || \
          curl -fL "https://github.com/NodeMedia/NodeMediaClient-Android/releases/download/2.8.0/NodeMediaClient.aar" \
            -o app/libs/NodeMediaClient.aar || \
          echo "Warning: NodeMedia AAR not downloaded, using stub"

      - name: Download cloudflared arm64
        run: |
          mkdir -p app/src/main/assets
          curl -fL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64" \
            -o app/src/main/assets/cloudflared-arm64
          chmod +x app/src/main/assets/cloudflared-arm64

      - name: Generate Keystore
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          else
            keytool -genkeypair -v \
              -keystore app/keystore.jks \
              -alias camerastream \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass camerastream123 \
              -keypass camerastream123 \
              -dname "CN=CameraStream,OU=Dev,O=EstacionKUS,L=Irapuato,S=GTO,C=MX"
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace --warning-mode=all
        env:
          KEYSTORE_FILE: app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'camerastream123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'camerastream' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'camerastream123' }}

      - name: Rename & Upload APK
        id: apk
        run: |
          APK_SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          APK_NAME="CameraStream-v1.1.0-$(date +'%Y%m%d-%H%M').apk"
          cp "$APK_SRC" "/tmp/${APK_NAME}"
          echo "path=/tmp/${APK_NAME}" >> $GITHUB_OUTPUT
          echo "name=${APK_NAME}" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CameraStream-APK
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ APK listo" >> $GITHUB_STEP_SUMMARY
          echo "**Archivo:** ${{ steps.apk.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Descarga:** este run → Artifacts → CameraStream-APK" >> $GITHUB_STEP_SUMMARY
