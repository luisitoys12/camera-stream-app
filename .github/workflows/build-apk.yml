name: Build APK & AAB (Play Store)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Generate Gradle Wrapper
        run: |
          sudo apt-get install -y gradle
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run unit tests
        run: ./gradlew test --no-daemon --continue

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/
          if-no-files-found: warn

  build:
    name: Build Signed APK + AAB
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Generate Gradle Wrapper
        run: |
          sudo apt-get install -y gradle
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Download NodeMedia AAR
        run: |
          mkdir -p app/libs
          curl -fL "https://github.com/NodeMedia/NodeMediaClient-Android/releases/download/2.9.2/NodeMediaClient.aar" \
            -o app/libs/NodeMediaClient.aar 2>/dev/null || echo "NodeMedia: usando JitPack"

      - name: Download cloudflared arm64
        run: |
          mkdir -p app/src/main/assets
          curl -fL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64" \
            -o app/src/main/assets/cloudflared-arm64 && \
          chmod +x app/src/main/assets/cloudflared-arm64 || echo "cloudflared: skip"

      - name: Decode or generate Keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > app/keystore.jks
            echo "SIGN_MODE=official" >> $GITHUB_ENV
          else
            keytool -genkeypair -v \
              -keystore app/keystore.jks -alias camerastream \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass camerastream123 -keypass camerastream123 \
              -dname "CN=CameraStream,OU=Dev,O=EstacionKUS,L=Irapuato,S=GTO,C=MX" 2>/dev/null
            echo "SIGN_MODE=auto" >> $GITHUB_ENV
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_FILE: app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'camerastream123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'camerastream' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'camerastream123' }}

      - name: Build Release AAB (Play Store)
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_FILE: app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'camerastream123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'camerastream' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'camerastream123' }}

      - name: Rename artifacts
        id: artifacts
        run: |
          VERSION="2.0.0-$(date +'%Y%m%d')"
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          AAB=$(find app/build/outputs/bundle/release -name '*.aab' | head -1)
          cp "$APK" "/tmp/CameraStream-v${VERSION}.apk"
          cp "$AAB" "/tmp/CameraStream-v${VERSION}.aab"
          echo "apk=/tmp/CameraStream-v${VERSION}.apk" >> $GITHUB_OUTPUT
          echo "aab=/tmp/CameraStream-v${VERSION}.aab" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CameraStream-APK
          path: ${{ steps.artifacts.outputs.apk }}
          retention-days: 30

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: CameraStream-AAB-PlayStore
          path: ${{ steps.artifacts.outputs.aab }}
          retention-days: 90

      - name: Summary
        run: |
          echo "## ✅ Build v${{ steps.artifacts.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "| Artefacto | Uso |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Instalar directo |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB | Google Play Console |" >> $GITHUB_STEP_SUMMARY
          echo "| Firma: **$SIGN_MODE** | ${SIGN_MODE} |" >> $GITHUB_STEP_SUMMARY
