name: Build & Upload APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Wrapper
        run: |
          # Download gradle-wrapper.jar directly (not in git due to binary)
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          curl -sL "https://github.com/gradle/gradle/raw/master/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || true
          # Fallback: use gradle wrapper task via system gradle
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            sudo apt-get install -y gradle
            gradle wrapper --gradle-version=8.11.1
          fi
          chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Download cloudflared arm64
        run: |
          mkdir -p app/src/main/assets
          curl -fL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64" \
            -o app/src/main/assets/cloudflared-arm64
          chmod +x app/src/main/assets/cloudflared-arm64

      - name: Generate Keystore
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          else
            keytool -genkeypair -v \
              -keystore app/keystore.jks \
              -alias camerastream \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass camerastream123 \
              -keypass camerastream123 \
              -dname "CN=CameraStream,OU=Dev,O=EstacionKUS,L=Irapuato,S=GTO,C=MX"
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_FILE: app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'camerastream123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'camerastream' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'camerastream123' }}

      - name: Rename APK
        id: apk_name
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          APK_SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          APK_NAME="CameraStream-v1.1.0-${DATE}.apk"
          cp "$APK_SRC" "/tmp/${APK_NAME}"
          echo "apk_path=/tmp/${APK_NAME}" >> $GITHUB_OUTPUT
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CameraStream-APK
          path: ${{ steps.apk_name.outputs.apk_path }}
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ APK listo para descargar" >> $GITHUB_STEP_SUMMARY
          echo "**Archivo:** ${{ steps.apk_name.outputs.apk_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Descarga:** Actions → este run → Artifacts → CameraStream-APK" >> $GITHUB_STEP_SUMMARY
